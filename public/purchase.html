<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoScripter Purchase</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen">
  <div class="max-w-3xl mx-auto p-6">
    <a href="/Dashboard" class="text-sm text-brand-600">← Back to Dashboard</a>
    <h1 class="text-2xl font-bold mt-3">Purchase</h1>
    <p class="text-sm text-gray-500 mt-1">Choose a plan or credits package.</p>

    <div class="mt-6 grid gap-3 sm:grid-cols-3">
      <a id="buy-pro-btn" target="_blank" rel="noreferrer" class="rounded-xl bg-brand-600 text-white p-4 text-center font-semibold">Buy PRO Tier</a>
      <a id="buy-500-btn" target="_blank" rel="noreferrer" class="rounded-xl bg-gray-800 text-white p-4 text-center font-semibold">Buy 500 Credits</a>
      <a id="buy-1200-btn" target="_blank" rel="noreferrer" class="rounded-xl bg-gray-800 text-white p-4 text-center font-semibold">Buy 1220 Credits</a>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
