<body class="h-screen overflow-hidden font-sans antialiased text-gray-900 dark:text-white mesh-bg dark:bg-gray-900">

<!-- 🔐 AUTH OVERLAY -->
<div id="auth-view" class="absolute inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm">
  <div class="max-w-xl w-full glass dark:glass-dark rounded-2xl shadow-xl border border-white/40 dark:border-gray-700 p-5">
    <p class="text-sm mb-3">Verify your Roblox account</p>

    <div id="auth-step-lookup" class="space-y-3">
      <input type="text" placeholder="Roblox username"
        class="w-full rounded-xl border px-3 py-2 text-sm bg-white/80 dark:bg-gray-900" />
      <button class="rounded-xl bg-brand-600 text-white px-4 py-2 text-sm">
        Start verification
      </button>
    </div>
  </div>
</div>

<!-- 🔥 APP -->
<div class="h-full flex flex-col">

  <!-- 🔝 HEADER -->
  <header class="h-14 shrink-0 border-b bg-white/90 dark:bg-gray-800/90 backdrop-blur px-4 flex items-center justify-between">
    <span class="font-bold text-brand-600">RoScripter</span>
    <div class="flex gap-3 items-center">
      <a href="/Purchase" class="text-xs font-semibold">Purchase</a>
      <button class="text-xs">Log out</button>
    </div>
  </header>

  <!-- 🧠 MAIN -->
  <div class="flex flex-1 overflow-hidden">

    <!-- 📌 SIDEBAR (NOW REAL SIDE PANEL) -->
    <aside class="w-64 shrink-0 border-r bg-white dark:bg-gray-800 flex flex-col">

      <div class="p-3 border-b">
        <div class="flex items-center gap-2">
          <img class="w-10 h-10 rounded-full" src="..." />
          <div>
            <div class="text-sm font-semibold">justaguy</div>
            <div class="text-xs text-gray-500">ID: 3108930777</div>
          </div>
        </div>
      </div>

      <div class="p-3 flex flex-col flex-1">
        <div class="text-[11px] uppercase text-gray-500 mb-2">Projects</div>

        <div class="flex gap-2 mb-2">
          <input class="w-full rounded border px-2 py-1 text-xs" placeholder="New project">
          <button class="bg-brand-600 text-white text-xs px-2 rounded">New</button>
        </div>

        <!-- 🔥 SCROLLABLE -->
        <div class="flex-1 overflow-y-auto text-xs text-gray-500">
          No projects yet.
        </div>
      </div>

    </aside>

    <!-- 💬 CHAT -->
    <div class="flex-1 flex flex-col">

      <!-- 🧠 ONLY THIS SCROLLS -->
      <div id="ai-chat-history" class="flex-1 overflow-y-auto p-4 space-y-2">
        <p class="text-xs text-gray-500">
          Create/select a project and send a prompt to start chatting.
        </p>
      </div>

      <!-- ⌨️ FIXED INPUT -->
      <div class="shrink-0 border-t bg-white dark:bg-gray-800 px-3 py-2">
        <div class="flex items-end gap-2">
          
          <textarea rows="2"
            class="flex-1 resize-none rounded border px-3 py-2 text-sm"
            placeholder="Message RoScripter AI..."></textarea>

          <select class="rounded border px-2 py-2 text-xs">
            <option>GPT-5.4 Mini</option>
          </select>

          <button class="bg-brand-600 text-white px-4 py-2 text-sm rounded">
            Send
          </button>

        </div>
      </div>

    </div>
  </div>
</div>
