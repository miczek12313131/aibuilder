<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoScripter Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#ecfeff',
              100: '#cffafe',
              200: '#a5f3fc',
              300: '#67e8f9',
              400: '#22d3ee',
              500: '#06b6d4',
              600: '#0891b2',
              700: '#0e7490',
              800: '#155e75',
              900: '#164e63',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .glass-dark {
      background: rgba(17, 24, 39, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .mesh-bg {
      background-color: #ffffff;
      background-image: radial-gradient(at 40% 20%, hsla(190,100%,94%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 0%, hsla(190,100%,90%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 50%, hsla(190,100%,96%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 50%, hsla(190,100%,92%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, hsla(190,100%,88%,1) 0px, transparent 50%);
    }
  </style>
</head>
<body class="h-screen overflow-hidden font-sans antialiased text-gray-900 dark:text-white mesh-bg dark:bg-gray-900">

<!-- 🔐 AUTH OVERLAY -->
<div id="auth-view" class="absolute inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm">
  <div class="max-w-xl w-full glass dark:glass-dark rounded-2xl shadow-xl border border-white/40 dark:border-gray-700 p-5">
    <p class="text-sm mb-3">Verify your Roblox account</p>

    <div id="auth-step-lookup" class="space-y-3">
      <input id="roblox-username-input" type="text" placeholder="Roblox username"
        class="w-full rounded-xl border px-3 py-2 text-sm bg-white/80 dark:bg-gray-900" />
      <button id="roblox-connect-btn" class="rounded-xl bg-brand-600 text-white px-4 py-2 text-sm">
        Start verification
      </button>
    </div>
     <div id="auth-step-verify" class="hidden mt-3 rounded-xl border p-3 text-xs">
        <p>Target: <strong>@<span id="auth-verify-username"></span></strong></p>
        <p class="mt-2">Add this code to your Roblox bio:</p>
        <code id="auth-verify-code" class="block mt-1 rounded border p-1.5 bg-gray-50 dark:bg-gray-900"></code>
        <div class="mt-3 flex gap-2">
          <button id="roblox-verify-btn" class="rounded-xl bg-brand-600 text-white px-3 py-1.5">Verify now</button>
          <button id="roblox-verify-cancel-btn" class="rounded-xl border px-3 py-1.5">Use different username</button>
        </div>
       <p id="auth-error" class="hidden text-red-500 text-sm mt-2"></p>
     </div>

<!-- 🔥 APP -->
<div class="h-full flex flex-col">

  <!-- 🔝 HEADER -->
  <header class="h-14 shrink-0 border-b bg-white/90 dark:bg-gray-800/90 backdrop-blur px-4 flex items-center justify-between">
    <span class="font-bold text-brand-600">RoScripter</span>
    <div class="flex gap-3 items-center">
      <a href="/Purchase" class="text-xs font-semibold">Purchase</a>
      <button class="text-xs">Log out</button>
    </div>
  </header>

  <!-- 🧠 MAIN -->
  <div class="flex flex-1 overflow-hidden">

    <!-- 📌 SIDEBAR (NOW REAL SIDE PANEL) -->
    <aside class="w-64 shrink-0 border-r bg-white dark:bg-gray-800 flex flex-col">

      <div class="p-3 border-b">
        <div class="flex items-center gap-2">
          <img id="studio-avatar" class="w-10 h-10 rounded-full" src="" alt="" />
          <div>
            <div id="studio-display-name" class="text-sm font-semibold"></div>
            <div id="studio-user-id" class="text-xs text-gray-500"></div>
          </div>
        </div>
      </div>

      <div class="p-3 flex flex-col flex-1">
        <div class="text-[11px] uppercase text-gray-500 mb-2">Projects</div>

        <div class="flex gap-2 mb-2">
          <input id="new-project-name" type="text" placeholder="New project" class="w-full rounded-lg border border-gray-200 dark:border-gray-600 px-2 py-1 text-xs bg-white/90 dark:bg-gray-900" />
          <button id="new-project-btn" class="rounded-lg bg-brand-600 text-white text-xs px-2">New</button>
        </div>

        <!-- 🔥 SCROLLABLE -->
        <div id="project-list" class="flex-1 overflow-auto text-xs text-gray-500">
        </div>
      </div>
    <!--         <div id="ai-chat-history" class="flex-1 overflow-auto p-4"></div> -->
    </aside>

    <!-- 💬 CHAT -->
    <div class="flex-1 flex flex-col">

      <!-- 🧠 ONLY THIS SCROLLS -->
      <div id="ai-chat-history" class="flex-1 overflow-y-auto p-4 space-y-2">
        <p class="text-xs text-gray-500">
          Create/select a project and send a prompt to start chatting.
        </p>
      </div>

      <!-- ⌨️ FIXED INPUT -->
      <div class="shrink-0 border-t bg-white dark:bg-gray-800 px-3 py-2">
        <div class="flex items-end gap-2">
          
          <textarea id="ai-prompt" rows="2"
            class="flex-1 resize-none rounded border px-3 py-2 text-sm"
            placeholder="Message RoScripter AI..."></textarea>

          <select id="ai-model" class="rounded border px-2 py-2 text-xs">
          </select>

          <button id="ai-send-btn" class="bg-brand-600 text-white px-4 py-2 text-sm rounded">
            Send
          </button>

        </div>
      </div>

    </div>
  </div>
</div>
</html>
