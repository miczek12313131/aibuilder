<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoScripter Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#ecfeff',
              100: '#cffafe',
              200: '#a5f3fc',
              300: '#67e8f9',
              400: '#22d3ee',
              500: '#06b6d4',
              600: '#0891b2',
              700: '#0e7490',
              800: '#155e75',
              900: '#164e63',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .glass-dark {
      background: rgba(17, 24, 39, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .mesh-bg {
      background-color: #ffffff;
      background-image: radial-gradient(at 40% 20%, hsla(190,100%,94%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 0%, hsla(190,100%,90%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 50%, hsla(190,100%,96%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 50%, hsla(190,100%,92%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, hsla(190,100%,88%,1) 0px, transparent 50%);
    }
  </style>
</head>
<body class="h-full font-sans antialiased text-gray-900 dark:text-white mesh-bg dark:bg-gray-900">
  <div class="h-full flex flex-col">
    <header class="h-16 shrink-0 border-b border-gray-200/70 dark:border-gray-700 glass dark:glass-dark px-4 sm:px-6 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="/Purchase" class="rounded-full bg-gradient-to-r from-brand-500 to-brand-600 text-white text-xs font-semibold px-4 py-2 shadow-lg shadow-brand-500/30">Buy Credits</a>
      </div>
      <button id="roblox-logout-btn" class="text-xs font-semibold text-gray-700 dark:text-gray-200">Log out</button>
    </header>

    <div id="auth-view" class="max-w-xl mx-auto mt-10 w-full glass dark:glass-dark rounded-2xl shadow-xl border border-white/40 dark:border-gray-700 p-5">
      <p class="text-sm mb-3">Verify your Roblox account</p>
      <div id="auth-step-lookup" class="space-y-3">
        <input id="roblox-username-input" type="text" placeholder="Roblox username" class="w-full rounded-xl border border-gray-200 dark:border-gray-600 px-3 py-2 text-sm bg-white/80 dark:bg-gray-900" />
        <button id="roblox-connect-btn" class="rounded-xl bg-brand-600 text-white px-4 py-2 text-sm">Start verification</button>
      </div>
      <div id="auth-step-verify" class="hidden mt-3 rounded-xl border p-3 text-xs">
        <p>Target: <strong>@<span id="auth-verify-username"></span></strong></p>
        <p class="mt-2">Add this code to your Roblox bio:</p>
        <code id="auth-verify-code" class="block mt-1 rounded border p-1.5 bg-gray-50 dark:bg-gray-900"></code>
        <div class="mt-3 flex gap-2">
          <button id="roblox-verify-btn" class="rounded-xl bg-brand-600 text-white px-3 py-1.5">Verify now</button>
          <button id="roblox-verify-cancel-btn" class="rounded-xl border px-3 py-1.5">Use different username</button>
        </div>
      </div>
      <p id="auth-error" class="hidden text-red-500 text-sm mt-2"></p>
    </div>

    <div id="studio-view" class="hidden flex flex-1 min-h-0 p-3 sm:p-5 gap-3 sm:gap-5">
      <aside id="projects-panel" class="w-80 shrink-0 glass dark:glass-dark rounded-2xl border border-white/50 dark:border-gray-700 p-3 flex flex-col transition-all duration-150 shadow-lg">
        <div class="mb-3 flex items-center gap-2">
          <img id="studio-avatar" class="w-10 h-10 rounded-full border border-white/70" src="" alt="" />
          <div>
            <div id="studio-display-name" class="text-sm font-semibold"></div>
            <div id="studio-user-id" class="text-xs text-gray-500"></div>
          </div>
        </div>
        <div class="text-[11px] uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-2">Projects</div>
        <div class="flex gap-2 mb-2">
          <input id="new-project-name" type="text" placeholder="New project" class="w-full rounded-lg border border-gray-200 dark:border-gray-600 px-2 py-1 text-xs bg-white/90 dark:bg-gray-900" />
          <button id="new-project-btn" class="rounded-lg bg-brand-600 text-white text-xs px-2">New</button>
        </div>
        <div id="project-list" class="space-y-1 overflow-auto"></div>
      </aside>

      <main class="flex-1 min-w-0 flex flex-col min-h-0 glass dark:glass-dark rounded-2xl border border-white/50 dark:border-gray-700 shadow-lg overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-200/80 dark:border-gray-700 text-xs font-semibold flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <button id="toggle-projects-btn" class="rounded-lg border border-gray-300 dark:border-gray-600 px-2 py-1 text-[11px]">Hide Projects</button>
            <span class="truncate">Active: <span id="active-project-name"></span></span>
          </div>
        </div>

        <div id="ai-chat-history" class="flex-1 overflow-auto p-5 pb-28"></div>

        <div class="absolute bottom-6 left-[calc(20rem+2.5rem)] right-8 hidden xl:block pointer-events-none"></div>

        <div class="border-t border-gray-200/80 dark:border-gray-700 bg-white/85 dark:bg-gray-800/85 px-3 py-2 mt-auto">
          <div class="flex items-center gap-2">
            <textarea id="ai-prompt" rows="2" placeholder="Message RoScripter AI..." class="flex-1 resize-none rounded-lg border border-gray-200 dark:border-gray-700 bg-white/90 dark:bg-gray-900 px-3 py-2 text-sm"></textarea>
            <div class="flex items-center gap-2 shrink-0">
              <span id="credits-pill" class="rounded-lg border border-gray-200 dark:border-gray-700 px-2 py-2 text-xs bg-white/90 dark:bg-gray-900">Credits: --</span>
              <select id="ai-model" class="rounded-lg border border-gray-200 dark:border-gray-700 bg-white/90 dark:bg-gray-900 px-2 py-2 text-xs"></select>
              <button id="ai-send-btn" class="rounded-lg bg-brand-600 text-white px-4 py-2 text-sm">Send</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-4 py-2 rounded-lg translate-y-20 opacity-0 transition-all">
    <span id="toast-message"></span>
  </div>

  <script src="/app.js"></script>
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toast-message');
      msg.textContent = message;
      toast.classList.remove('translate-y-20','opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20','opacity-0'), 2500);
    }
    window.openSignupModal = () => (window.location.href = '/Dashboard');
    window.closeSignupModal = () => {};
  </script>
</body>
</html>
