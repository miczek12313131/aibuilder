<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoScripter Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    window.DEBUG_MODE = true;

    const Debug = {
      logs: [],
      max: 200,

      push(type, msg, data) {
        const entry = {
          time: new Date().toLocaleTimeString(),
          type,
          msg,
          data
        };

        this.logs.push(entry);
        if (this.logs.length > this.max) this.logs.shift();

        console.log(`[RoScripter:${type}]`, msg, data || "");
        this.render();
      },

      render() {
        const box = document.getElementById("debug-console");
        if (!box) return;

        box.innerHTML = this.logs.slice(-20).map(l => `
          <div>
            <span style="color:#888">[${l.time}]</span>
            <b>${l.type}</b> ${l.msg}
          </div>
        `).join("");

        box.scrollTop = box.scrollHeight;
      }
    };

    function initDebugUI() {
      const box = document.createElement("div");
      box.id = "debug-console";

      box.style.cssText = `
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 380px;
        height: 240px;
        overflow: auto;
        background: rgba(0,0,0,0.88);
        color: #00ff88;
        font-size: 11px;
        padding: 10px;
        z-index: 999999;
        border-radius: 12px;
        font-family: monospace;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      `;

      document.addEventListener("DOMContentLoaded", () => {
        document.body.appendChild(box);
        Debug.push("INIT", "Debug system online 💀");
      });
    }

    initDebugUI();

    // 🔥 GLOBAL ERROR TRACKING
    window.addEventListener("error", (e) => {
      Debug.push("ERROR", e.message, {
        file: e.filename,
        line: e.lineno,
        col: e.colno
      });
    });

    window.addEventListener("unhandledrejection", (e) => {
      Debug.push("PROMISE", e.reason?.message || "unknown", e.reason);
    });

  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              600: '#0891b2'
            }
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body class="h-screen overflow-hidden font-sans bg-gray-100">

<!-- 🔐 AUTH -->
<div id="auth-view" class="absolute inset-0 flex items-center justify-center bg-black/30">
  <div class="bg-white p-5 rounded-xl w-[420px]">

    <p class="text-sm mb-3">Verify Roblox account</p>

    <input id="roblox-username-input"
      class="w-full border px-3 py-2 rounded mb-2 text-sm"
      placeholder="Username" />

    <button id="roblox-connect-btn"
      class="w-full bg-cyan-600 text-white py-2 rounded text-sm">
      Start verification
    </button>

    <p id="auth-error" class="text-red-500 text-xs mt-2 hidden"></p>

  </div>
</div>

<!-- 🧠 APP -->
<div class="h-full flex flex-col">

  <header class="h-12 flex items-center justify-between px-4 bg-white border-b">
    <b>RoScripter</b>
    <button id="roblox-logout-btn" class="text-xs">Logout</button>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r flex flex-col">
      <div class="p-3">
        <input id="new-project-name"
          class="w-full border px-2 py-1 text-xs rounded"
          placeholder="New project" />

        <button id="new-project-btn"
          class="w-full mt-2 bg-cyan-600 text-white text-xs py-1 rounded">
          New
        </button>
      </div>

      <div id="project-list" class="p-2 text-xs overflow-auto"></div>
    </aside>

    <!-- CHAT -->
    <div class="flex-1 flex flex-col">

      <div id="ai-chat-history" class="flex-1 p-3 overflow-auto text-xs"></div>

      <div class="p-2 border-t bg-white flex gap-2">
        <textarea id="ai-prompt"
          class="flex-1 border rounded p-2 text-xs"
          placeholder="message..."></textarea>

        <button id="ai-send-btn"
          class="bg-cyan-600 text-white px-3 rounded text-xs">
          Send
        </button>
      </div>

    </div>
  </div>
</div>

<script>
(function () {

  let projects = [];
  let activeProjectId = null;

  const el = (id) => document.getElementById(id);

  const Debug = window.Debug || {
    push: () => {}
  };

  // ---------------- AUTH ----------------
  el("roblox-connect-btn")?.addEventListener("click", async () => {
    Debug.push("CLICK", "connect");

    const username = el("roblox-username-input")?.value?.trim();
    if (!username) return;

    try {
      Debug.push("API", "lookup", { username });

      const res = await fetch("/api/roblox/lookup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });

      const data = await res.json();

      Debug.push("API_OK", "lookup success", data);

    } catch (e) {
      Debug.push("API_FAIL", "lookup failed", e);
    }
  });

  // ---------------- PROJECTS ----------------
  async function loadProjects() {
    Debug.push("STATE", "loading projects");

    const res = await fetch("/api/projects");
    const data = await res.json();

    projects = data.projects || [];

    Debug.push("STATE_OK", "projects loaded", {
      count: projects.length
    });

    renderProjects();
  }

  function renderProjects() {
    const list = el("project-list");
    if (!list) return;

    list.innerHTML = projects.map(p => `
      <div onclick="openProject('${p.id}')" style="padding:4px;cursor:pointer;">
        📁 ${p.name}
      </div>
    `).join("");

    Debug.push("UI", "projects rendered");
  }

  window.openProject = async (id) => {
    Debug.push("CLICK", "open project", { id });

    activeProjectId = id;

    const res = await fetch(`/api/projects/${id}`);
    const data = await res.json();

    Debug.push("API_OK", "project loaded", data);

  };

  // ---------------- CHAT ----------------
  el("ai-send-btn")?.addEventListener("click", async () => {
    const prompt = el("ai-prompt")?.value;
    if (!prompt) return;

    Debug.push("CHAT", "sending", { prompt });

    try {
      const res = await fetch(`/api/projects/${activeProjectId}/messages`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      Debug.push("CHAT_OK", "response received", data);

    } catch (e) {
      Debug.push("CHAT_FAIL", "message failed", e);
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    Debug.push("INIT", "app started");

    loadProjects();
  });

})();
</script>

</body>
</html>
