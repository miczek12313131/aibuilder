<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoScripter</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="h-screen overflow-hidden bg-gray-100">

<!-- 🔐 AUTH -->
<div id="auth-view" class="absolute inset-0 z-50 flex items-center justify-center bg-black/40">

  <div class="w-full max-w-xl bg-white rounded-xl p-5">

    <p class="text-sm mb-3 font-semibold">Verify Roblox</p>

    <!-- STEP 1 -->
    <div id="auth-step-lookup" class="space-y-3">

      <input id="roblox-username-input"
        class="w-full border rounded px-3 py-2 text-sm"
        placeholder="Roblox username"/>

      <button id="roblox-connect-btn"
        class="bg-blue-600 text-white px-4 py-2 rounded">
        Start verification
      </button>

    </div>

    <!-- STEP 2 -->
    <div id="auth-step-verify" class="hidden">

      <p class="text-xs">User: <b id="auth-verify-username"></b></p>

      <div class="mt-2 text-xs">
        Code:
        <code id="auth-verify-code" class="block bg-gray-100 p-2 mt-1 rounded"></code>
      </div>

      <div class="flex gap-2 mt-3">

        <button id="roblox-verify-btn"
          class="bg-green-600 text-white px-3 py-1 rounded">
          Verify
        </button>

        <button id="roblox-verify-cancel-btn"
          class="border px-3 py-1 rounded">
          Cancel
        </button>

      </div>

    </div>

    <p id="auth-error" class="text-red-500 text-xs mt-2 hidden"></p>

  </div>
</div>

<!-- 🧠 APP -->
<div class="h-full flex flex-col">

  <!-- HEADER -->
  <header class="h-12 bg-white border-b flex items-center px-3 justify-between">
    <b>RoScripter</b>
  </header>

  <!-- MAIN -->
  <div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r flex flex-col">

      <div class="p-3 border-b">
        <div class="text-sm font-semibold">Projects</div>
      </div>

      <div id="project-list" class="flex-1 overflow-y-auto p-2 text-xs">
        No projects
      </div>

    </aside>

    <!-- CHAT -->
    <div class="flex flex-col flex-1">

      <!-- CHAT HISTORY -->
      <div id="chat" class="flex-1 overflow-y-auto p-3 space-y-2">
        <div class="text-xs text-gray-500">Start chatting...</div>
      </div>

      <!-- INPUT -->
      <div class="border-t p-2 flex gap-2">

        <input id="input"
          class="flex-1 border rounded px-2 py-1 text-sm"
          placeholder="Message..."/>

        <button id="send"
          class="bg-blue-600 text-white px-4 rounded">
          Send
        </button>

      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
