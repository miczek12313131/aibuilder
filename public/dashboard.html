<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoScripter Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white">
  <div class="h-full flex flex-col">
    <header class="h-14 shrink-0 border-b border-gray-200 dark:border-gray-700 bg-white/90 dark:bg-gray-800/90 backdrop-blur px-4 flex items-center justify-between">
      <a href="/" class="font-bold text-brand-600">RoScripter</a>
      <div class="flex items-center gap-2">
        <a href="/Purchase" class="rounded-lg bg-brand-600 text-white text-xs font-semibold px-3 py-1.5">Purchase</a>
        <button id="roblox-logout-btn" class="text-xs font-semibold text-gray-600 dark:text-gray-200">Log out</button>
      </div>
    </header>

    <div id="auth-view" class="max-w-xl mx-auto mt-10 w-full bg-white dark:bg-gray-800 rounded-xl shadow p-5">
      <p class="text-sm mb-3">Verify your Roblox account</p>
      <div id="auth-step-lookup" class="space-y-3">
        <input id="roblox-username-input" type="text" placeholder="Roblox username" class="w-full rounded-lg border px-3 py-2 text-sm bg-white dark:bg-gray-900 dark:border-gray-600" />
        <button id="roblox-connect-btn" class="rounded-lg bg-brand-600 text-white px-4 py-2 text-sm">Start verification</button>
      </div>
      <div id="auth-step-verify" class="hidden mt-3 rounded-lg border p-3 text-xs">
        <p>Target: <strong>@<span id="auth-verify-username"></span></strong></p>
        <p class="mt-2">Add this code to your Roblox bio:</p>
        <code id="auth-verify-code" class="block mt-1 rounded border p-1.5 bg-gray-50 dark:bg-gray-900"></code>
        <div class="mt-3 flex gap-2">
          <button id="roblox-verify-btn" class="rounded-lg bg-brand-600 text-white px-3 py-1.5">Verify now</button>
          <button id="roblox-verify-cancel-btn" class="rounded-lg border px-3 py-1.5">Use different username</button>
        </div>
      </div>
      <p id="auth-error" class="hidden text-red-500 text-sm mt-2"></p>
    </div>

    <div id="studio-view" class="hidden flex-1 min-h-0">
      <aside class="w-72 shrink-0 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-3 flex flex-col">
        <div class="mb-3 flex items-center gap-2">
          <img id="studio-avatar" class="w-9 h-9 rounded-full border" src="" alt="" />
          <div>
            <div id="studio-display-name" class="text-sm font-semibold"></div>
            <div id="studio-user-id" class="text-xs text-gray-500"></div>
          </div>
        </div>
        <div class="flex gap-2 mb-2">
          <input id="new-project-name" type="text" placeholder="New project" class="w-full rounded border px-2 py-1 text-xs bg-white dark:bg-gray-900 dark:border-gray-600" />
          <button id="new-project-btn" class="rounded bg-brand-600 text-white text-xs px-2">New</button>
        </div>
        <div id="project-list" class="space-y-1 overflow-auto"></div>
      </aside>

      <main class="flex-1 min-w-0 flex flex-col">
        <div class="px-4 py-2 border-b border-gray-200 dark:border-gray-700 text-xs font-semibold">Active: <span id="active-project-name"></span></div>
        <div id="ai-chat-history" class="flex-1 overflow-auto p-4"></div>

        <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-2">
          <div class="flex items-end gap-2">
            <textarea id="ai-prompt" rows="2" placeholder="Message RoScripter AI..." class="flex-1 resize-none rounded-md border border-gray-300 dark:border-gray-600 bg-transparent px-3 py-2 text-sm"></textarea>
            <select id="ai-model" class="rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 px-2 py-2 text-xs"></select>
            <button id="ai-send-btn" class="rounded-md bg-brand-600 text-white px-4 py-2 text-sm">Send</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-4 py-2 rounded-lg translate-y-20 opacity-0 transition-all">
    <span id="toast-message"></span>
  </div>

  <script src="/app.js"></script>
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toast-message');
      msg.textContent = message;
      toast.classList.remove('translate-y-20','opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20','opacity-0'), 2500);
    }
    window.openSignupModal = () => (window.location.href = '/Dashboard');
    window.closeSignupModal = () => {};
  </script>
</body>
</html>
