<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoScripter Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#ecfeff',
              100: '#cffafe',
              200: '#a5f3fc',
              300: '#67e8f9',
              400: '#22d3ee',
              500: '#06b6d4',
              600: '#0891b2',
              700: '#0e7490',
              800: '#155e75',
              900: '#164e63',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .glass-dark {
      background: rgba(17, 24, 39, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .mesh-bg {
      background-color: #ffffff;
      background-image: radial-gradient(at 40% 20%, hsla(190,100%,94%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 0%, hsla(190,100%,90%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 50%, hsla(190,100%,96%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 50%, hsla(190,100%,92%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, hsla(190,100%,88%,1) 0px, transparent 50%);
    }
  </style>
</head>
<body class="h-full font-sans antialiased text-gray-900 dark:text-white mesh-bg dark:bg-gray-900">
<div class="h-screen flex flex-col">

  <!-- 🔝 TOP HEADER -->
  <header class="h-14 shrink-0 border-b border-gray-200 dark:border-gray-700 bg-white/90 dark:bg-gray-800/90 backdrop-blur px-4 flex items-center justify-between">
    <a href="/" class="font-bold text-brand-600">RoScripter</a>

    <a href="/Purchase" class="h-10 rounded-xl bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 text-xs font-semibold px-3 flex items-center justify-center">
      Purchase
    </a>

    <button id="roblox-logout-btn" class="text-xs font-semibold text-gray-600 dark:text-gray-200">
      Log out
    </button>
  </header>

  <!-- 🔥 MAIN AREA -->
  <div class="flex flex-1 overflow-hidden">

    <!-- 📌 SIDEBAR -->
    <aside class="w-64 shrink-0 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-3 flex flex-col">
      
      <div class="mb-3 flex items-center gap-2">
        <img id="studio-avatar" class="w-10 h-10 rounded-full border border-white/70" src="..." />
        <div>
          <div class="text-sm font-semibold">justaguy</div>
          <div class="text-xs text-gray-500">ID: 3108930777</div>
        </div>
      </div>

      <div class="text-[11px] uppercase text-gray-500 mb-2">Projects</div>

      <div class="flex gap-2 mb-2">
        <input class="w-full rounded-lg border px-2 py-1 text-xs" placeholder="New project">
        <button class="rounded-lg bg-brand-600 text-white text-xs px-2">New</button>
      </div>

      <!-- 🔥 scrollable sidebar -->
      <div id="project-list" class="flex-1 overflow-y-auto text-xs text-gray-500">
        No projects yet.
      </div>

    </aside>

    <!-- 💬 CHAT AREA -->
    <div class="flex-1 flex flex-col">

      <!-- 🧠 CHAT HISTORY (ONLY THIS SCROLLS) -->
      <div id="ai-chat-history" class="flex-1 overflow-y-auto p-4">
        <p class="text-xs text-gray-500">
          Create/select a project and send a prompt to start chatting.
        </p>
      </div>

      <!-- ⌨️ INPUT (STAYS FIXED) -->
      <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2">
        <div class="flex items-end gap-2">
          
          <textarea rows="2"
            class="flex-1 resize-none rounded border px-3 py-2 text-sm"
            placeholder="Message RoScripter AI..."></textarea>

          <select class="rounded border px-2 py-2 text-xs">
            <option>GPT-5.4 Mini</option>
          </select>

          <button class="rounded bg-brand-600 text-white px-4 py-2 text-sm">
            Send
          </button>

        </div>
      </div>

    </div>
  </div>
</div>

  <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-4 py-2 rounded-lg translate-y-20 opacity-0 transition-all">
    <span id="toast-message"></span>
  </div>

  <script src="/app.js"></script>
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toast-message');
      msg.textContent = message;
      toast.classList.remove('translate-y-20','opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20','opacity-0'), 2500);
    }
    window.openSignupModal = () => (window.location.href = '/Dashboard');
    window.closeSignupModal = () => {};
  </script>
</body>
</html>
